<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ purpose }}</title>
</head>
<body style="font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f4f4;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background: #f4f4f4; padding: 24px;">
        <tr>
            <td align="center">
                <table width="600" cellpadding="0" cellspacing="0" style="background: #ffffff; border-radius: 8px; overflow: hidden;">
                    <tr>
                        <td style="background: #007bff; color: #ffffff; padding: 24px; text-align: center;">
                            <h1 style="margin: 0; font-size: 24px;">{{ purpose }}</h1>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 24px; color: #333333;">
                            <p>Hello {{ user.username }},</p>
                            <p>Your verification code is:</p>
                            <p style="font-size: 28px; font-weight: bold; letter-spacing: 2px;">{{ code }}</p>
                            <p>Enter this code in the verification form to complete the process.</p>
                            <p>If you did not request this code, please contact support at <a href="mailto:{{ support_email }}">{{ support_email }}</a>.</p>
                            <p style="margin-bottom: 0;">Thank you,<br />The ProductStore Team</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
